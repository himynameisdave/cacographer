name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint · Format · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint (oxlint, strict)
        run: bun run lint

      - name: Format check (oxfmt)
        run: bun run format:check

      - name: Typecheck client (svelte-check, fail on warnings)
        run: bun run check

      - name: Typecheck server (tsc)
        run: bun run check:server

      - name: Tests (engine + client)
        run: bun test

      - name: Build
        run: bun run build
